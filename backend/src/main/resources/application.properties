spring.application.name=Grupo-Ginga-Capoeira
# Configurações do Servidor
server.port=8080
spring.sql.init.mode=always

# Configurações do Banco de Dados (PostgreSQL)
# O Spring vai buscar os valores dentro dos ${} nas variáveis de ambiente do seu sistema ou IDE
spring.datasource.url=jdbc:postgresql://localhost:5432/db_grupoginga
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Configuração de Upload de Arquivos
# Define a pasta raiz onde as fotos serão salvas na raiz do seu projeto
grupoginga.storage.local.diretorio=uploads/fotos_alunos

# Limites de tamanho de arquivo (Ex: máximo de 5MB por foto)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Caminho para salvar as fotos (também via variável de ambiente para flexibilidade)
app.upload.dir=${APP_UPLOAD_PATH}

