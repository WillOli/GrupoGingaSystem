<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Grupo Ginga Capoeira</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 rounded-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <img src="logo.png" alt="Grupo Ginga Capoeira" class="img-fluid rounded-circle border border-2 border-primary shadow-sm" style="max-width: 150px;">
                    </div>
                    <h3 class="text-center mb-4 text-primary">Acessar o Sistema</h3>
                    <form id="loginForm">
                        <div id="loginError" class="alert alert-danger d-none" role="alert">
                            E-mail ou senha inválidos.
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label text-secondary">E-mail</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-4">
                            <label for="senha" class="form-label text-secondary">Senha</label>
                            <input type="password" class="form-control" id="senha" name="senha" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="#" class="text-secondary small">Esqueceu a senha?</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="login.js"></script>
</body>
</html>
