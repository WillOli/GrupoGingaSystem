<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Grupo Ginga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="theme-claro">

<div class="position-fixed top-0 end-0 p-3">
    <button id="themeToggle" class="btn btn-outline-primary rounded-pill">
        <i class="bi bi-moon-stars-fill"></i> Alternar Visual
    </button>
</div>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg border-0" style="width: 100%; max-width: 400px; border-radius: 20px;">
        <div class="card-body p-5">

            <div class="text-center mb-4">
                <img src="img/logo.png" alt="Grupo Ginga"
                     class="rounded-circle shadow-sm border border-4 border-warning logo-ginga">
            </div>

            <h3 class="text-center mb-4 fw-bold titulo-sistema">Grupo Ginga</h3>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label label-custom">Usuário</label>
                    <input type="text" class="form-control form-control-lg input-custom" id="username" placeholder="Digite seu usuário" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label label-custom">Senha</label>
                    <input type="password" class="form-control form-control-lg input-custom" id="password" placeholder="********" required>
                </div>
                <button type="submit" class="btn btn-lg w-100 fw-bold btn-entrar">
                    ENTRAR
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted small footer-text">Sistema de Gestão - Mestre Agostinho</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/login.js"></script>
</body>
</html>
